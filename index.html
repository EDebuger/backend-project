<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webshop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBody">
    <header id="mainHeader">
        <section id="top">
            <div id="login"><button id="loginButton" style="cursor: pointer;">Login</button></div>
            <div id="logo"><img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fd1csarkz8obe9u.cloudfront.net%2Fposterpreviews%2Fprofessional-logo-design-template-99eb60199346b115b2cb5cd32eebb582_screen.jpg%3Fts%3D1621160488&f=1&nofb=1&ipt=78014ba0e2e1c7c8bb31674689281ed188a355c8fa24ca6b5a8a7b20e74b12da" alt="logo"></div>
            <div id="cart"><img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.freepnglogos.com%2Fuploads%2Fshopping-cart-png%2Fshopping-cart-svg-png-icon-download-28.png&f=1&nofb=1&ipt=2638c27563ce1513f34514d334b14de464d65fbbb8a986ba3597003d5b42f2f1" alt="cart logo"></div>
        </section>
        <section id="categories">
            <div class="category" id="automativeBtn"><p>Automotive</p></div>
            <div class="category" id="beautyBtn"><p>Beauty & Personal Care</p></div>
            <div class="category" id="bookBtn"><p>Books</p></div>
            <div class="category" id="clothingBtn"><p>Clothing</p></div>
            <div class="category" id="electronicsBtn"><p>Electronics</p></div>
            <div class="category" id="gardenBtn"><p>Garden</p></div>
            <div class="category" id="healthBtn"><p>Health & Wellness</p></div>
            <div class="category" id="homeBtn"><p>Home & Kitchen</p></div>
            <div class="category" id="sportsBtn"><p>Sports</p></div>
            <div class="category" id="toysBtn"><p>Toys</p></div>
        </section>
    </header>
    <main>
        
        <section id="productPage">
            <div id="productFilters">
                <input type="button" value="A-Z" id="alphabet"> <!--sort by alphabetic order-->
                <input type="button" value="Price" id="price"> <!--sort by price-->
                <input type="text" id="searchBar" placeholder="Search..."> <!--Search products-->
            </div>
            <div class="product">
                
            </div>
        </section>
    </main>
    <footer>
        <section id="contactInfo">Tel:040-555-10</section>
        <section id="copyright">&Copyright 2026</section>
        <section id="whatEverIHaventDecidedYet">Random info</section>
    </footer>

    <script>
    document.getElementById("loginButton").onclick = function() {
        window.location.href = 'login.html'; // respond if the server responds with redirect
    };

    document.getElementsByClassName(".category")    
    


        </script>   
    <script src="productPage.js"></script>
    <script src="cartScript.js"></script>    
</body>
</html>
